services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: spore_space
    volumes:
      - spore-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spore -d spore_space"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://spore:${POSTGRES_PASSWORD}@postgres:5432/spore_space
      AUTH_SECRET: ${AUTH_SECRET}
      API_URL: ${PUBLIC_BACKEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        PUBLIC_BACKEND_URL: ${PUBLIC_BACKEND_URL}
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - backend
    restart: unless-stopped

volumes:
  spore-db-data:
    name: spore-db-data
